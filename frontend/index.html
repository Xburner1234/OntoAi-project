<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onto.ai - AI Agent Platform</title>
<style>
  :root {
    --primary: #60A5FA; --primary-hover: #3B82F6; --primary-light: #EFF6FF; 
    --primary-bg: #F0F9FF; --accent: #0EA5E9; --bg: #F8FAFC; --white: #FFFFFF;
    --border: #E2E8F0; --text-main: #0F172A; --text-sub: #64748B;
    --shadow: 0 4px 6px -1px rgba(0,0,0,0.05); --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.05);
    --radius: 12px; --radius-sm: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text-main); height: 100vh; overflow: hidden; }
  button { cursor: pointer; font-family: inherit; border: none; outline: none; }
  input, textarea, select { font-family: inherit; outline: none; border: none; }

  /* === AUTH === */
  .auth-page { display: flex; height: 100vh; background: linear-gradient(135deg, #E0F2FE 0%, #BAE6FD 100%); }
  .auth-left { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 60px; }
  .auth-logo { font-size: 42px; font-weight: 800; color: var(--primary-hover); letter-spacing: -1px; }
  .auth-logo span { color: var(--accent); }
  .auth-slogan { font-size: 28px; margin-top: 16px; font-weight: 700; color: #1E293B; line-height: 1.3; }
  .auth-desc { font-size: 16px; margin-top: 16px; color: var(--text-sub); line-height: 1.6; max-width: 420px; }
  .auth-right { width: 480px; display: flex; align-items: center; justify-content: center; padding: 40px; }
  .auth-card { background: var(--white); padding: 40px; border-radius: 20px; box-shadow: var(--shadow-lg); width: 100%; max-width: 420px; }
  .auth-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
  .auth-subtitle { font-size: 14px; color: var(--text-sub); margin-bottom: 28px; }
  .form-group { margin-bottom: 20px; }
  .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-sub); margin-bottom: 8px; }
  .form-input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; background: var(--bg); transition: all 0.2s; }
  .form-input:focus { border-color: var(--primary); background: var(--white); box-shadow: 0 0 0 3px rgba(96,165,250,0.2); }
  .email-display { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--primary-light); border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; color: var(--primary-hover); }
  .change-email-btn { background: none; color: var(--text-sub); font-size: 12px; text-decoration: underline; }
  .code-row { display: flex; gap: 12px; }
  .code-row .form-input { flex: 1; letter-spacing: 4px; text-align: center; font-size: 18px; font-weight: 600; }
  .code-btn { padding: 0 20px; background: var(--primary-light); color: var(--primary-hover); border-radius: var(--radius-sm); font-weight: 600; font-size: 13px; white-space: nowrap; }
  .code-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .submit-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; margin-top: 8px; transition: all 0.2s; }
  .submit-btn:hover { background: var(--primary-hover); }

  /* === LAYOUT === */
  .app-container { display: none; height: 100vh; flex-direction: column; }
  .app-container.active { display: flex; }
  .top-nav { height: 60px; background: var(--white); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; justify-content: space-between; }
  .nav-left { display: flex; align-items: center; gap: 32px; }
  .nav-logo { font-size: 22px; font-weight: 800; color: var(--primary-hover); }
  .nav-logo span { color: var(--accent); }
  .nav-right { display: flex; align-items: center; gap: 16px; }
  .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: 600; }
  .main-content { flex: 1; overflow: hidden; position: relative; }

  /* === CHAT === */
  .chat-sidebar { width: 300px; background: var(--white); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
  .new-chat-btn { width: 100%; padding: 12px; background: var(--primary); color: white; border-radius: var(--radius-sm); font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 16px; }
  .history-title { font-size: 12px; font-weight: 600; color: var(--text-sub); text-transform: uppercase; margin: 16px 0 8px; }
  .history-list { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .history-item { padding: 10px 12px; border-radius: var(--radius-sm); font-size: 14px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .history-item:hover, .history-item.active { background: var(--primary-light); color: var(--primary-hover); font-weight: 500; }
  
  /* Agent Config & Presets */
  .agent-config-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 16px; overflow: hidden; }
  .config-header { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-size: 13px; font-weight: 600; background: var(--primary-light); user-select: none; }
  .config-body { padding: 12px; display: none; border-top: 1px solid var(--border); }
  .config-body.active { display: block; }
  .config-body textarea { width: 100%; min-height: 80px; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; resize: vertical; background: var(--bg); }
  .save-config-btn { width: 100%; padding: 8px; background: var(--primary); color: white; border-radius: 6px; font-size: 13px; font-weight: 600; margin-top: 10px; }
  .config-status { font-size: 11px; color: #10B981; margin-top: 6px; display: none; text-align: center; }
  .preset-label { font-size: 12px; font-weight: 600; color: var(--text-sub); margin-bottom: 8px; margin-top: 12px; }
  .preset-agents-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .preset-agent-card { padding: 10px 8px; border: 1.5px solid var(--border); border-radius: 8px; cursor: pointer; background: var(--bg); text-align: center; }
  .preset-agent-card:hover { border-color: var(--primary); background: var(--primary-light); }
  .preset-agent-card.active { border-color: var(--primary); background: var(--primary-light); box-shadow: 0 0 0 2px rgba(96,165,250,0.2); }
  .preset-agent-icon { font-size: 20px; margin-bottom: 2px; }
  .preset-agent-name { font-size: 12px; font-weight: 600; }

  .chat-main { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
  .chat-messages { flex: 1; overflow-y: auto; padding: 40px 20%; display: flex; flex-direction: column; gap: 24px; }
  .message { display: flex; gap: 16px; max-width: 100%; }
  .message.user { flex-direction: row-reverse; }
  .msg-avatar { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; }
  .message.ai .msg-avatar { background: var(--primary-light); color: var(--primary-hover); }
  .message.user .msg-avatar { background: #E2E8F0; color: var(--text-sub); }
  .msg-content { flex: 1; max-width: 80%; display: flex; flex-direction: column; gap: 10px; }
  .msg-bubble { padding: 14px 18px; border-radius: 16px; font-size: 15px; line-height: 1.6; }
  .message.ai .msg-bubble { background: var(--white); border: 1px solid var(--border); border-top-left-radius: 4px; }
  .message.user .msg-bubble { background: var(--primary); color: white; border-top-right-radius: 4px; align-self: flex-end; }
  
  /* Agent Thought UI */
  .agent-thought-box { background: #F8FAFC; border: 1px dashed #CBD5E1; border-radius: 8px; padding: 12px; font-size: 13px; color: #475569; line-height: 1.5; }
  .thought-label, .tool-label { font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  .thought-label { color: #0EA5E9; }
  .tool-label { color: #F59E0B; margin-top: 8px; }
  .agent-thought-box pre { background: #F1F5F9; padding: 8px; border-radius: 4px; margin-top: 4px; white-space: pre-wrap; word-break: break-all; font-size: 12px; }

  .chat-input-area { padding: 20px 20% 30px; background: var(--bg); }
  .chat-input-box { background: var(--white); border: 1.5px solid var(--border); border-radius: 16px; padding: 12px 16px; display: flex; align-items: flex-end; gap: 12px; box-shadow: var(--shadow); }
  .chat-input-box:focus-within { border-color: var(--primary); }
  .chat-textarea { flex: 1; resize: none; font-size: 15px; line-height: 1.5; max-height: 120px; background: transparent; }
  .send-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }
</style>
</head>
<body>

<!-- AUTH PAGE -->
<div id="page-auth" class="auth-page">
  <div class="auth-left">
    <div class="auth-logo">Onto<span>.ai</span></div>
    <div class="auth-slogan">构建下一代<br>AI Agent 平台</div>
    <div class="auth-desc">Onto.ai 提供强大的大模型接口集成与智能体编排能力，让您可以轻松构建专属的 AI 应用。</div>
  </div>
  <div class="auth-right">
    <div class="auth-card">
      <h2 class="auth-title">欢迎使用 Onto.ai</h2>
      <p class="auth-subtitle">输入您的邮箱，我们将发送验证码。新用户将自动创建账号。</p>
      <div id="auth-step-1">
        <div class="form-group">
          <label class="form-label">邮箱地址</label>
          <input type="email" class="form-input" id="auth-email" placeholder="your@email.com" onkeydown="if(event.key==='Enter')handleSendCode()">
        </div>
        <button class="submit-btn" onclick="handleSendCode()">发送验证码</button>
      </div>
      <div id="auth-step-2" style="display: none;">
        <div class="form-group">
          <label class="form-label">邮箱地址</label>
          <div class="email-display"><span id="display-email"></span><button class="change-email-btn" onclick="backToStep1()">修改</button></div>
        </div>
        <div class="form-group">
          <label class="form-label">验证码</label>
          <div class="code-row">
            <input type="text" class="form-input" id="auth-code" placeholder="000000" maxlength="6" onkeydown="if(event.key==='Enter')handleAuth()">
            <button class="code-btn" id="resend-code-btn" onclick="handleSendCode()">重新发送</button>
          </div>
        </div>
        <button class="submit-btn" onclick="handleAuth()">登录 / 注册</button>
      </div>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app-container" class="app-container">
  <nav class="top-nav">
    <div class="nav-left">
      <div class="nav-logo">Onto<span>.ai</span></div>
    </div>
    <div class="nav-right">
      <button class="nav-link" onclick="logout()" style="padding: 8px 16px; border-radius: 6px; font-size: 14px; font-weight: 500; color: var(--text-sub); background: transparent;">退出</button>
      <div class="user-avatar" id="user-avatar">U</div>
    </div>
  </nav>

  <div class="main-content">
    <!-- CHAT PAGE -->
    <div id="page-chat" style="display: flex; height: 100%;">
      <div class="chat-sidebar">
        <button class="new-chat-btn" onclick="newChat()">+ 新建对话</button>
        
        <div class="form-group" style="margin-bottom: 16px;">
          <label class="form-label">应用模式</label>
          <select id="app-type-select" class="form-input" style="padding: 10px; font-size: 13px; cursor: pointer;">
            <option value="chatbot">💬 普通对话 (Chatbot)</option>
            <option value="agent">🤖 智能体 (Agent)</option>
          </select>
        </div>

        <div class="agent-config-card">
          <div class="config-header" onclick="toggleAgentConfig()">
            <span>🤖 Agent 角色设定</span>
            <span id="config-arrow">▼</span>
          </div>
          <div class="config-body" id="agent-config-body">
            <div class="preset-label">选择预设 Agent：</div>
            <div class="preset-agents-grid" id="preset-agents-grid"></div>
            <div class="preset-label">自定义描述 (可修改)：</div>
            <textarea id="agent-description" placeholder="定义 AI 的角色和行为..."></textarea>
            <button class="save-config-btn" onclick="saveAgentDescription()">应用设定</button>
            <div class="config-status" id="config-status">✓ 设定已应用</div>
          </div>
        </div>

        <div class="history-title">历史记录</div>
        <div class="history-list" id="history-list"></div>
      </div>
      
      <div class="chat-main">
        <div class="chat-messages" id="chat-messages">
          <div class="message ai"><div class="msg-avatar">AI</div><div class="msg-content"><div class="msg-bubble">您好！我是 Onto.ai 助手。您可以选择左侧的预设 Agent 开始对话。</div></div></div>
        </div>
        <div class="chat-input-area">
          <div class="chat-input-box">
            <textarea class="chat-textarea" id="chat-input" rows="1" placeholder="输入您的问题..." onkeydown="handleInputKeydown(event)"></textarea>
            <button class="send-btn" onclick="sendMessage()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // ================= STATE =================
  let codeTimer = null;
  let chatHistories = [{ id: 1, title: '关于Agent架构的讨论', messages: [] }];
  let currentChatId = 1;
  let currentDifyConversationId = '';
  let currentAgentDescription = '';
  let selectedPresetId = 'custom';
  
  const presetAgents = [
    { id: 'custom', name: '自定义', icon: '✨', prompt: '' },
    { id: 'coder', name: '代码专家', icon: '💻', prompt: '你是一个资深的全栈软件工程师。在回答编程问题时，请提供清晰的代码示例、详细的注释，并解释背后的设计模式。' },
    { id: 'writer', name: '爆款写手', icon: '✍️', prompt: '你是一个深谙新媒体传播的爆款文案写手。你的文字极具感染力，擅长使用引人注目的标题、痛点共鸣和情绪价值。多使用短句和emoji。' },
    { id: 'translator', name: '专业翻译', icon: '🌐', prompt: '你是一个精通中英双语的专业翻译官。你的翻译不仅要求准确无误，还要符合目标语言的表达习惯和文化背景（地道）。' },
    { id: 'analyst', name: '数据分析师', icon: '📊', prompt: '你是一个严谨的商业数据分析师。擅长从复杂的数据和业务背景中提取关键洞察。回答问题时，请使用结构化的思维，多使用数据支撑。' },
    { id: 'teacher', name: '苏格拉底导师', icon: '🦉', prompt: '你是一位采用苏格拉底式提问法的导师。你不直接给出答案，而是通过一系列启发性的问题，引导用户自己思考并得出结论。' }
  ];

  // ================= AUTH =================
  function handleSendCode() {
    const email = document.getElementById('display-email').textContent || document.getElementById('auth-email').value.trim();
    if (!email || !email.includes('@')) return alert('请输入有效的邮箱地址');
    document.getElementById('auth-step-1').style.display = 'none';
    document.getElementById('auth-step-2').style.display = 'block';
    document.getElementById('display-email').textContent = email;
    startCountdown();
  }
  function backToStep1() {
    document.getElementById('auth-step-1').style.display = 'block';
    document.getElementById('auth-step-2').style.display = 'none';
    if (codeTimer) clearInterval(codeTimer);
  }
  function startCountdown() {
    const btn = document.getElementById('resend-code-btn');
    btn.disabled = true; let sec = 60; btn.textContent = `${sec}s`;
    codeTimer = setInterval(() => { sec--; btn.textContent = `${sec}s`; if (sec <= 0) { clearInterval(codeTimer); btn.disabled = false; btn.textContent = '重新发送'; } }, 1000);
  }
  function handleAuth() {
    const code = document.getElementById('auth-code').value.trim();
    if (code.length !== 6) return alert('请输入6位数字验证码');
    const email = document.getElementById('display-email').textContent;
    document.getElementById('user-avatar').textContent = email.charAt(0).toUpperCase();
    document.getElementById('page-auth').style.display = 'none';
    document.getElementById('app-container').classList.add('active');
    renderHistory(); renderPresetAgents();
  }
  function logout() {
    document.getElementById('app-container').classList.remove('active');
    document.getElementById('page-auth').style.display = 'flex';
    document.getElementById('auth-step-1').style.display = 'block';
    document.getElementById('auth-step-2').style.display = 'none';
  }

  // ================= CHAT =================
  function renderHistory() {
    document.getElementById('history-list').innerHTML = chatHistories.map(h => `<div class="history-item ${h.id === currentChatId ? 'active' : ''}" onclick="selectChat(${h.id})">${h.title}</div>`).join('');
  }
  function selectChat(id) { currentChatId = id; renderHistory(); }
  function newChat() {
    const id = Date.now();
    chatHistories.unshift({ id, title: '新对话', messages: [] });
    currentChatId = id; currentDifyConversationId = '';
    renderHistory();
    document.getElementById('chat-messages').innerHTML = `<div class="message ai"><div class="msg-avatar">AI</div><div class="msg-content"><div class="msg-bubble">您好！我们开始新的对话吧。</div></div></div>`;
  }
  function handleInputKeydown(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

  async function sendMessage() {
    const text = document.getElementById('chat-input').value.trim();
    if (!text) return;
    const appType = document.getElementById('app-type-select').value;
    const msgArea = document.getElementById('chat-messages');
    msgArea.innerHTML += `<div class="message user"><div class="msg-avatar">U</div><div class="msg-content"><div class="msg-bubble">${text}</div></div></div>`;
    document.getElementById('chat-input').value = '';
    msgArea.scrollTop = msgArea.scrollHeight;

    const loadingId = 'loading-' + Date.now();
    msgArea.innerHTML += `<div class="message ai" id="${loadingId}"><div class="msg-avatar">${appType === 'agent' ? '🤖' : 'AI'}</div><div class="msg-content"><div class="msg-bubble" style="color:var(--text-sub)">正在思考...</div></div></div>`;
    msgArea.scrollTop = msgArea.scrollHeight;
    await callLLMAPI(text, loadingId, currentDifyConversationId, appType);
  }

  async function callLLMAPI(userMessage, loadingId, conversationId, appType) {
    const msgArea = document.getElementById('chat-messages');
    const msgContentEl = document.getElementById(loadingId).querySelector('.msg-content');
    const bubbleEl = msgContentEl.querySelector('.msg-bubble');
    bubbleEl.textContent = ''; bubbleEl.style.color = 'var(--text-main)';
    let fullText = '', buffer = '';

    try {
      // ⚠️ 请确保这里替换为您真实的 Railway 后端 URL
      const BACKEND_URL = 'https://ontoai-project-production.up.railway.app'; 
      
       const response = await fetch(`${BACKEND_URL}/api/chat`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: userMessage, conversation_id: conversationId, app_type: appType, system_prompt: currentAgentDescription })
      });
      
      // ⬇️ 增强错误处理：如果状态码不是 200，尝试读取 Dify 返回的具体错误原因
      if (!response.ok) {
        let errorMsg = `HTTP ${response.status}`;
        try {
          const errorData = await response.json();
          errorMsg = errorData.message || errorData.details || errorMsg;
        } catch (e) {}
        throw new Error(errorMsg);
      }

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const messages = buffer.split('\n\n'); buffer = messages.pop();
        for (const msg of messages) {
          if (!msg.trim()) continue;
          let eventType = '', dataStr = '';
          msg.split('\n').forEach(line => { if (line.startsWith('event:')) eventType = line.substring(6).trim(); if (line.startsWith('data:')) dataStr = line.substring(5).trim(); });
          if (dataStr) {
            try {
              const json = JSON.parse(dataStr);
              if (eventType === 'agent_thought' && appType === 'agent') {
                let html = '';
                if (json.thought) html += `<div class="thought-label">🧠 思考过程</div><div>${json.thought}</div>`;
                if (json.tool) html += `<div class="tool-label">🛠️ 调用工具: ${json.tool}</div><pre>${json.tool_input || ''}</pre>`;
                if (json.observation) html += `<div class="tool-label">👁️ 观察结果</div><pre>${json.observation}</pre>`;
                if (html) { const box = document.createElement('div'); box.className = 'agent-thought-box'; box.innerHTML = html; msgContentEl.insertBefore(box, bubbleEl); }
              } else if (eventType === 'message' && json.answer) {
                fullText += json.answer; bubbleEl.textContent = fullText;
              }
              if (json.conversation_id) currentDifyConversationId = json.conversation_id;
              msgArea.scrollTop = msgArea.scrollHeight;
            } catch (e) {}
          }
        }
      }
    } catch (error) { 
      bubbleEl.textContent = `⚠️ 连接后端失败: ${error.message}。请检查 Railway 后端是否正常运行及 URL 是否正确。`; 
      bubbleEl.style.color = '#EF4444'; 
    }
  }

  // ================= AGENT CONFIG =================
  function toggleAgentConfig() {
    const body = document.getElementById('agent-config-body');
    body.classList.toggle('active');
    document.getElementById('config-arrow').textContent = body.classList.contains('active') ? '▲' : '▼';
  }
  function renderPresetAgents() {
    document.getElementById('preset-agents-grid').innerHTML = presetAgents.map(a => `
      <div class="preset-agent-card ${a.id === selectedPresetId ? 'active' : ''}" onclick="selectPresetAgent('${a.id}')">
        <div class="preset-agent-icon">${a.icon}</div><div class="preset-agent-name">${a.name}</div>
      </div>`).join('');
  }
  function selectPresetAgent(id) {
    selectedPresetId = id;
    const agent = presetAgents.find(a => a.id === id);
    if (agent) {
      document.getElementById('agent-description').value = agent.prompt;
      currentAgentDescription = agent.prompt;
      renderPresetAgents();
      showConfigStatus(id === 'custom' ? '✓ 已切换为自定义' : `✓ 已切换为「${agent.name}」`);
    }
  }
  function saveAgentDescription() {
    const text = document.getElementById('agent-description').value.trim();
    currentAgentDescription = text;
    const currentPreset = presetAgents.find(a => a.id === selectedPresetId);
    if (currentPreset && currentPreset.prompt !== text) { selectedPresetId = 'custom'; renderPresetAgents(); }
    showConfigStatus('✓ 设定已应用');
  }
  function showConfigStatus(msg) {
    const el = document.getElementById('config-status');
    el.textContent = msg; el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 2000);
  }

  renderHistory();
</script>
</body>
</html>
